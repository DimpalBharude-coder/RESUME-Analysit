INDEX_HTML = """
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Analyzer AI - ATS Score & Jobs</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <div class="header">
        <h1>🎯 Resume Analyzer AI</h1>
        <p>ATS Score • Skills • Jobs • Tips</p>
    </div>

    
    <h2>ATS Score: <span id="score"></span></h2>

    <div class="upload-box" onclick="document.getElementById('fileInput').click()">
        <div class="upload-icon">📄</div>
        <h3>Upload Resume</h3>
        <input type="file" id="fileInput" accept=".pdf,.docx">
    </div>

    <div class="loading" id="loading">Loading...</div>
    <div class="resumeborder">
        <div class="results" id="results">
        <div id="skillsList"></div>
        <div id="jobsList"></div>
        <div id="improvementsList"></div>
        <div id="stats"></div>
    </div>
    </div>
    

    <div id="aiResult"></div>

</div>

<script>

const fileInput = document.getElementById('fileInput');

fileInput.addEventListener('change', handleFile);

async function handleFile() {
    const file = fileInput.files[0];

    const formData = new FormData();
    formData.append('resume', file);

    const res = await fetch('/analyze', {
        method: 'POST',
        body: formData
    });

    const data = await res.json();

    if (data.success) {
        showResults(data);
    }
}

function showResults(data) {

    
    const scoreCircle = document.getElementById('scoreCircle');
    if(scoreCircle){
        scoreCircle.textContent = data.score;
    }


    document.getElementById("score").innerText = data.score;

    document.getElementById('aiResult').innerText = data.ai_analysis;

}

async function uploadResume() {
    const fileInput = document.getElementById("resume");
    const formData = new FormData();
    formData.append("resume", fileInput.files[0]);

    const res = await fetch("/analyze", {
        method: "POST",
        body: formData
    });

    const data = await res.json();

    if (data.success) {
        document.getElementById("score").innerText = data.score;
        document.getElementById("result").innerText = data.ai_analysis;
    } else {
        alert(data.error);
    }
}

</script>

</body>
</html>
"""
